name: Bug Report
description: Report a bug in HealthPush (iOS app or Home Assistant integration)
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below as completely as possible. The more detail you provide, the faster we can diagnose and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of HealthPush is affected?
      options:
        - iOS App
        - Home Assistant Integration
        - Both
        - Other / Not sure
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: The HealthPush version (found in the app's Settings screen or About section).
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS Version
      description: "Your iOS version (Settings > General > About)."
      placeholder: "17.4"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Your iPhone model.
      placeholder: "iPhone 15 Pro"
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version (if applicable)
      description: Your Home Assistant Core version. Leave blank if the issue is iOS-only.
      placeholder: "2024.6.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Go to Destinations
        3. Tap 'Test Connection'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual behavior.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Screenshots
      description: |
        Paste any relevant logs or attach screenshots.
        For iOS logs, you can use Console.app and filter by "HealthPush".
        For Home Assistant logs, check Settings > System > Logs.
      placeholder: Paste logs here or drag and drop screenshots.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help us diagnose the issue (network setup, VPN, number of metrics enabled, etc.).
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this bug has not been reported before.
          required: true
        - label: I am using the latest version of HealthPush.
          required: false
