name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 5 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            os: macos-15
            build-mode: manual
          - language: python
            os: ubuntu-24.04
            build-mode: none
          - language: actions
            os: ubuntu-24.04
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Toolchain install must run BEFORE github/codeql-action/init because
      # init sets up a shell tracer that forces Rosetta on macos-15 ARM
      # runners for wrapped build steps. `brew install` run under that
      # tracer hits "Cannot install under Rosetta 2 in ARM default prefix".
      # Installing tools natively first and then letting CodeQL wrap only
      # the xcodebuild step keeps the tracer happy.
      - name: Verify Xcode (Swift only)
        if: matrix.language == 'swift'
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen (Swift only)
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Generate Xcode project (Swift only)
        if: matrix.language == 'swift'
        working-directory: ios/HealthPush
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Manual build for CodeQL (Swift only)
        if: matrix.language == 'swift'
        working-directory: ios/HealthPush
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
        run: |
          set -o pipefail
          # ARCHS=arm64 + ONLY_ACTIVE_ARCH=YES prevent the runner from
          # compiling an x86_64 slice under Rosetta, which is ~3-4x slower
          # than native on Apple Silicon and adds 10+ minutes to the analysis.
          xcodebuild build \
            -project HealthPush.xcodeproj \
            -scheme HealthPush \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
