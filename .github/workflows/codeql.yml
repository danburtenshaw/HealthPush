name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 5 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            os: macos-15
            build-mode: manual
          - language: python
            os: ubuntu-24.04
            build-mode: none
          - language: actions
            os: ubuntu-24.04
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Toolchain install must run BEFORE github/codeql-action/init because
      # init sets up a shell tracer that forces Rosetta on macos-15 ARM
      # runners for wrapped build steps. `brew install` run under that
      # tracer hits "Cannot install under Rosetta 2 in ARM default prefix".
      # Installing tools natively first and then letting CodeQL wrap only
      # the xcodebuild step keeps the tracer happy.
      - name: Verify Xcode (Swift only)
        if: matrix.language == 'swift'
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen (Swift only)
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Generate Xcode project (Swift only)
        if: matrix.language == 'swift'
        working-directory: ios/HealthPush
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Manual build for CodeQL (Swift only)
        if: matrix.language == 'swift'
        working-directory: ios/HealthPush
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
        run: |
          set -o pipefail
          xcodebuild build \
            -project HealthPush.xcodeproj \
            -scheme HealthPush \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          category: "/language:${{ matrix.language }}"
