name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      PROJECT_DIR: ios/HealthPush
      SCHEME: HealthPush
      DESTINATION: "platform=iOS Simulator,name=iPhone 16,OS=18.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version
          swift --version

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('ios/HealthPush/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift Package dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HealthPush.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      - name: Build for iOS Simulator (Release)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project HealthPush.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "$DESTINATION" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | xcbeautify --renderer github-actions

      - name: Run unit tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project HealthPush.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -skipPackagePluginValidation \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | xcbeautify --renderer github-actions

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          retention-days: 14
          if-no-files-found: ignore
