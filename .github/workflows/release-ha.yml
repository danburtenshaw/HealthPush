name: Release Home Assistant Integration

on:
  push:
    tags:
      - "ha-v*"

permissions:
  contents: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write # keyless cosign signing via Sigstore OIDC

    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG_NAME#ha-v}" >> "$GITHUB_OUTPUT"

      - name: Validate integration files exist
        run: |
          if [ ! -d "integrations/homeassistant/custom_components/healthpush" ]; then
            echo "Error: custom_components/healthpush directory not found"
            exit 1
          fi

      - name: Package integration
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd integrations/homeassistant
          zip -r "$RUNNER_TEMP/healthpush-ha-${VERSION}.zip" \
            custom_components/healthpush/ \
            -x "*__pycache__*" "*.pyc"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifact (keyless)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cosign sign-blob --yes \
            --output-signature "$RUNNER_TEMP/healthpush-ha-${VERSION}.zip.sig" \
            --output-certificate "$RUNNER_TEMP/healthpush-ha-${VERSION}.zip.pem" \
            "$RUNNER_TEMP/healthpush-ha-${VERSION}.zip"

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat <<EOF > "$RUNNER_TEMP/release-notes.md"
          ## HealthPush Home Assistant Integration v${VERSION}

          ### Installation via HACS (recommended)
          1. Open HACS in Home Assistant
          2. Add this repository as a custom repository
          3. Search for "HealthPush" and install

          ### Manual Installation
          1. Download the \`healthpush-ha-${VERSION}.zip\` asset below
          2. Extract the \`custom_components/healthpush\` folder
          3. Copy it to your Home Assistant \`custom_components/\` directory
          4. Restart Home Assistant

          ### Verifying the release (optional)
          Each release is signed with [Sigstore](https://www.sigstore.dev/) via keyless GitHub OIDC.
          To verify the zip against its \`.sig\` and \`.pem\`:
          \`\`\`
          cosign verify-blob \\
            --certificate healthpush-ha-${VERSION}.zip.pem \\
            --signature healthpush-ha-${VERSION}.zip.sig \\
            --certificate-identity-regexp 'https://github.com/danburtenshaw/HealthPush/\.github/workflows/release-ha\.yml@.*' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            healthpush-ha-${VERSION}.zip
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: "Home Assistant Integration v${{ steps.version.outputs.version }}"
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            ${{ runner.temp }}/healthpush-ha-${{ steps.version.outputs.version }}.zip
            ${{ runner.temp }}/healthpush-ha-${{ steps.version.outputs.version }}.zip.sig
            ${{ runner.temp }}/healthpush-ha-${{ steps.version.outputs.version }}.zip.pem
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: true
