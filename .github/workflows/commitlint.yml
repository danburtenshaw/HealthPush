name: Lint PR Title

# Enforces Conventional Commits on PR titles so release-please can parse them.
# See CONTRIBUTING.md "Commit Messages — Conventional Commits" for the spec.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  # amannn/action-semantic-pull-request needs `write` to manage the WIP
  # label (wip: true). Read-only permission produces a confusing
  # "Resource not accessible by integration" error on every run.
  pull-requests: write

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate PR title
    # Bot PRs (Renovate, release-please) already use Conventional Commits
    # by convention (`chore(deps): update ...`) and run with restricted
    # tokens that can't always satisfy pull_request_target permission
    # requirements, so the action errors with "Resource not accessible by
    # integration". Skip the validator for bot PRs; they're already
    # well-formed.
    if: github.actor != 'renovate[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Validate Conventional Commit format
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            build
            security
            revert
          scopes: |
            ios
            ha
            storage-core
            destinations
            sync
            docs
            ci
            deps
            release
          requireScope: false
          disallowScopes: |
            [A-Z]+
          subjectPattern: ^[A-Z].*[^.]$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with an uppercase letter and not end with a period.
          wip: true
          validateSingleCommit: false
