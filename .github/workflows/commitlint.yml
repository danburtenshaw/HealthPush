name: Lint PR Title

# Enforces Conventional Commits on PR titles so release-please can parse them.
# See CONTRIBUTING.md "Commit Messages — Conventional Commits" for the spec.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

concurrency:
  group: commitlint-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Validate Conventional Commit format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            build
            security
            revert
          requireScope: false
