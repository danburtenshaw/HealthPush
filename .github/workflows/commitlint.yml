name: Lint PR Title

# Enforces Conventional Commits on PR titles so release-please can parse them.
# See CONTRIBUTING.md "Commit Messages — Conventional Commits" for the spec.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  # Minimum required for amannn/action-semantic-pull-request to read the
  # PR title. The `wip: true` feature is intentionally disabled below
  # because HealthPush is a public repo, which means GitHub's native
  # draft PRs cover the WIP use case. Draft PRs don't need a workflow
  # to post pending statuses, so we avoid the extra `statuses: write`
  # permission that `wip: true` would otherwise require.
  pull-requests: read

concurrency:
  group: commitlint-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate PR title
    # Bot PRs (Renovate, release-please) already use Conventional Commits
    # by convention (`chore(deps): update ...`) and run with restricted
    # tokens that can't always satisfy pull_request_target permission
    # requirements, so the action errors with "Resource not accessible by
    # integration". Skip the validator for bot PRs; they're already
    # well-formed.
    if: github.actor != 'renovate[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Validate Conventional Commit format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            build
            security
            revert
          scopes: |
            ios
            ha
            storage-core
            destinations
            sync
            docs
            ci
            deps
            release
          requireScope: false
          disallowScopes: |
            [A-Z]+
          subjectPattern: ^[A-Z].*[^.]$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with an uppercase letter and not end with a period.
          # wip: true intentionally omitted. HealthPush is public so
          # contributors can use GitHub's native draft PR feature
          # instead of the `[WIP]` title prefix workaround.
          validateSingleCommit: false
