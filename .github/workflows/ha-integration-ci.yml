name: Home Assistant Integration CI

on:
  push:
    branches: [main]
    paths:
      - "integrations/homeassistant/**"
      - ".github/workflows/ha-integration-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "integrations/homeassistant/**"
      - ".github/workflows/ha-integration-ci.yml"

permissions:
  contents: read

concurrency:
  group: ha-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: integrations/homeassistant

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: integrations/homeassistant/uv.lock

      - name: Install dev + test dependencies
        run: uv sync --locked --group dev --group test

      - name: ruff lint
        run: uv run ruff check custom_components/ tests/

      - name: ruff format check
        run: uv run ruff format --check custom_components/ tests/

      - name: mypy (strict)
        run: uv run mypy custom_components/healthpush

      - name: bandit (security)
        run: uv run bandit -r custom_components/ -c pyproject.toml

      - name: pytest with coverage
        run: uv run pytest

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ha-coverage
          path: integrations/homeassistant/coverage.xml
          retention-days: 14
          if-no-files-found: ignore
