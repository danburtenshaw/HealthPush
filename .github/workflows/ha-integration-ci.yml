name: Home Assistant Integration CI

on:
  push:
    branches: [main]
    paths:
      - "integrations/homeassistant/**"
      - ".github/workflows/ha-integration-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "integrations/homeassistant/**"
      - ".github/workflows/ha-integration-ci.yml"

permissions:
  contents: read

concurrency:
  group: ha-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: integrations/homeassistant

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            integrations/homeassistant/requirements_dev.txt
            integrations/homeassistant/requirements_test.txt

      - name: Install dev + test dependencies
        run: |
          python -m pip install -r requirements_dev.txt
          if [ -f requirements_test.txt ]; then
            python -m pip install -r requirements_test.txt
          fi

      - name: ruff lint
        run: ruff check custom_components/ tests/

      - name: ruff format check
        run: ruff format --check custom_components/ tests/

      - name: mypy (strict)
        run: mypy custom_components/healthpush

      - name: bandit (security)
        run: bandit -r custom_components/ -c pyproject.toml

      - name: pytest with coverage
        run: pytest

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ha-coverage
          path: integrations/homeassistant/coverage.xml
          retention-days: 14
          if-no-files-found: ignore
