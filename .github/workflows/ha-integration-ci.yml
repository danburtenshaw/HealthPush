name: Home Assistant Integration CI

on:
  push:
    branches: [main]
    paths:
      - "integrations/homeassistant/**"
      - ".github/workflows/ha-integration-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "integrations/homeassistant/**"
      - ".github/workflows/ha-integration-ci.yml"

permissions:
  contents: read

concurrency:
  group: ha-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: integrations/homeassistant

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install linting tools
        run: python -m pip install ruff

      - name: Run ruff linter
        run: ruff check custom_components/

      - name: Check formatting with ruff
        run: ruff format --check custom_components/

      - name: Install test dependencies
        run: |
          if [ -f requirements_test.txt ]; then
            python -m pip install -r requirements_test.txt
          elif [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
