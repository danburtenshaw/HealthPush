name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@f5b971718edcbb31275a1db40004592335c0e031 # v4.5.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          allow-licenses: >-
            Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MIT,
            MPL-2.0, PostgreSQL, Python-2.0, Unlicense, 0BSD, CC0-1.0
