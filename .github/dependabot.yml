version: 2

updates:
  # ── GitHub Actions ────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      github-actions-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"

  # ── Python — HA integration dev + test deps ──────────────────────
  - package-ecosystem: "pip"
    directory: "/integrations/homeassistant"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "scope: ha"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      python-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      python-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"

  # ── Swift Package Manager — HealthPushStorageCore ────────────────
  # This directory's Package.swift is the only place HealthPush allows
  # SPM deps. The `packages/HealthPushStorageCore/` path is enforced by
  # scripts/check-no-third-party-deps.sh.
  - package-ecosystem: "swift"
    directory: "/packages/HealthPushStorageCore"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "swift"
      - "scope: storage-core"
    commit-message:
      prefix: "deps"
    groups:
      swift-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      swift-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"

  # ── Ruby — Fastlane toolchain ────────────────────────────────────
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ruby"
      - "scope: release"
    commit-message:
      prefix: "deps"
    groups:
      ruby-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      ruby-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
