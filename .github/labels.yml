# HealthPush label taxonomy.
# Synced by .github/workflows/label-sync.yml on push to main.
# Add/remove here, not in the GitHub UI.
#
# Rules:
#   - Add a "destination: <name>" label only when the destination has shipped.
#     Speculative destinations live in destination request issues, not in the
#     label taxonomy.
#   - Scope labels are assigned automatically by .github/workflows/labeler.yml
#     based on which paths a PR touches — see .github/labeler.yml for the map.

# ── Type ──────────────────────────────────────────────────────────
- name: bug
  color: "d73a4a"
  description: Something isn't working
- name: feature
  color: "a2eeef"
  description: New functionality
- name: enhancement
  color: "a2eeef"
  description: Improvement to existing functionality
- name: refactor
  color: "cfd3d7"
  description: Code refactor with no user-visible change
- name: docs
  color: "0075ca"
  description: Documentation changes
- name: test
  color: "d4c5f9"
  description: Test-only changes
- name: chore
  color: "ededed"
  description: Routine maintenance
- name: ci
  color: "000000"
  description: CI/CD pipeline changes
- name: security
  color: "b60205"
  description: Security-related
- name: performance
  color: "fbca04"
  description: Performance improvement or regression

# ── Scope ─────────────────────────────────────────────────────────
# Applied automatically by the path-based labeler. The release train is
# derived from the scope, so no separate "release: *" labels.
- name: "scope: ios"
  color: "1d76db"
  description: iOS app
- name: "scope: ha"
  color: "1d76db"
  description: Home Assistant integration
- name: "scope: storage-core"
  color: "1d76db"
  description: packages/HealthPushStorageCore
- name: "scope: destinations"
  color: "1d76db"
  description: Sync destination abstraction or implementations
- name: "scope: sync"
  color: "1d76db"
  description: SyncEngine, scheduling, background tasks
- name: "scope: docs"
  color: "1d76db"
  description: User or contributor docs
- name: "scope: release"
  color: "1d76db"
  description: Fastlane, release-please, versioning

# ── Priority ──────────────────────────────────────────────────────
- name: "priority: critical"
  color: "b60205"
  description: Blocks release or causes data loss
- name: "priority: high"
  color: "d93f0b"
  description: Important, schedule soon
- name: "priority: medium"
  color: "fbca04"
  description: Normal priority
- name: "priority: low"
  color: "0e8a16"
  description: Nice to have

# ── Status ────────────────────────────────────────────────────────
- name: triage
  color: "ededed"
  description: Needs maintainer triage
- name: "needs-repro"
  color: "ededed"
  description: Waiting for reproduction steps
- name: "needs-info"
  color: "ededed"
  description: Waiting for additional information
- name: "needs-design"
  color: "ededed"
  description: Requires design discussion
- name: blocked
  color: "b60205"
  description: Blocked on an external dependency
- name: wontfix
  color: "ffffff"
  description: This will not be worked on
- name: duplicate
  color: "cfd3d7"
  description: This issue or PR already exists
- name: invalid
  color: "e4e669"
  description: This doesn't seem right
- name: "good first issue"
  color: "7057ff"
  description: Good for newcomers
- name: "help wanted"
  color: "008672"
  description: Extra attention is needed

# ── Destinations ──────────────────────────────────────────────────
# Only real, shipped destinations get their own label. Proposals live under
# "destination: proposed"; accepted proposals transition to "destination:
# accepted" until the implementation lands, at which point a per-destination
# label is added here.
- name: "destination: proposed"
  color: "bfd4f2"
  description: A new destination is proposed but not yet accepted
- name: "destination: accepted"
  color: "0e8a16"
  description: A new destination is accepted for implementation
- name: "destination: s3"
  color: "c5def5"
  description: Changes to the S3 destination
- name: "destination: homeassistant"
  color: "c5def5"
  description: Changes to the Home Assistant destination

# ── Automation ────────────────────────────────────────────────────
- name: dependencies
  color: "0366d6"
  description: Dependency updates
- name: python
  color: "0366d6"
  description: Python dependency
- name: swift
  color: "0366d6"
  description: Swift dependency
- name: ruby
  color: "0366d6"
  description: Ruby dependency
- name: "ai-review"
  color: "5319e7"
  description: Trigger full AI code review
- name: automerge
  color: "0e8a16"
  description: Merge when all checks pass
