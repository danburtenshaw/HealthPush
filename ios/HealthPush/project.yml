name: HealthPush
options:
  bundleIdPrefix: com.healthpush
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  HealthPush:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthpush.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/HealthPush.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: Resources/HealthPush.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true

  HealthPushTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: HealthPush
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthpush.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HealthPush.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HealthPush"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  HealthPush:
    build:
      targets:
        HealthPush: all
        HealthPushTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HealthPushTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
