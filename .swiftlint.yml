# HealthPush SwiftLint config
#
# Currently runs in warnings-only mode in CI. Will flip to `--strict` once
# the existing warnings are cleaned up and the refactor backlog lands.
#
# Docs: https://realm.github.io/SwiftLint/rule-directory.html

included:
  - ios/HealthPush/Sources
  - ios/HealthPush/Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - ios/HealthPush/HealthPush.xcodeproj

# ── Disabled defaults (case-by-case) ──────────────────────────────
disabled_rules:
  - todo                     # Plan enforces no TODOs via repo-guards elsewhere
  - trailing_comma           # SwiftFormat owns this — conflict avoidance
  - opening_brace            # SwiftFormat owns this
  - multiple_closures_with_trailing_closure # SwiftUI style conflicts

# ── Opt-in rules (high signal, low noise) ─────────────────────────
opt_in_rules:
  - anyobject_protocol
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discarded_notification_center_observer
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_interface_builder
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - unused_declaration
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# ── Rule tuning ───────────────────────────────────────────────────
line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 80
  error: 150

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 12
  error: 20

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 5

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 80
  excluded:
    - id
    - to
    - on
    - x
    - y
    - z
    - i
    - j
    - n

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 80

force_unwrapping:
  severity: warning

force_cast:
  severity: warning

force_try:
  severity: error

# ── File header template ──────────────────────────────────────────
# Kept deliberately minimal; file_header is not enforced yet, but the
# pattern is here for when the rule is enabled.
file_header:
  required_pattern: |
                    \/\/
                    \/\/  .*?\.swift
                    \/\/  HealthPush
                    \/\/.*

# ── Custom rules ──────────────────────────────────────────────────
custom_rules:
  no_print_in_production:
    name: "No print() in production"
    regex: '^[^/\n]*\bprint\('
    message: "Use os.Logger instead of print() in production code."
    severity: error
    included:
      - "ios/HealthPush/Sources/.*\\.swift"
      - "packages/.*/Sources/.*\\.swift"

  no_nslog:
    name: "No NSLog"
    regex: '\bNSLog\('
    message: "Use os.Logger instead of NSLog."
    severity: error
    included:
      - "ios/HealthPush/Sources/.*\\.swift"
      - "packages/.*/Sources/.*\\.swift"

  no_force_calendar_date_add:
    name: "No force-unwrap on Calendar.date(byAdding:)"
    regex: 'Calendar\.\w+\.date\(byAdding:[^)]+\)\!'
    message: "Calendar.date(byAdding:) can return nil at DST transitions — use Date.daysAgo(_:) helper or handle the nil."
    severity: error

reporter: "xcode"
